<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ display_name }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <img id="display" alt="{{ display_name }}" src="">
  <script>
    const endpoint = {{ image_endpoint | tojson }};
    const refreshMs = {{ refresh_seconds }} * 1000;
    const img = document.getElementById('display');

    function refreshImage() {
      img.src = endpoint + '?t=' + Date.now();
    }

    refreshImage();
    setInterval(refreshImage, refreshMs);
  </script>
</body>
</html>
